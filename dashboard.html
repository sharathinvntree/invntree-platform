<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvnTree Dashboard</title>
<link rel="icon" href="/img/favicon.png">
<link rel="stylesheet" href="css/shared.css">
<style>
  .welcome {
    background: linear-gradient(135deg, var(--navy) 0%, #234b8c 100%);
    border-radius: 14px; padding: 28px 32px;
    color: #fff; margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    box-shadow: 0 4px 20px rgba(26,47,94,.25);
  }
  .welcome h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .welcome p  { font-size: 14px; color: rgba(255,255,255,.65); }
  .welcome-gold { color: var(--gold); }
  .welcome-icon { font-size: 48px; opacity: .6; }

  .modules-label {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; color: var(--muted); margin-bottom: 16px;
  }

  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  /* Module card */
  .module-card {
    background: #fff; border-radius: 14px;
    border: 1.5px solid var(--border);
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
    padding: 28px; display: flex; flex-direction: column; gap: 16px;
    transition: box-shadow .2s, border-color .2s;
    position: relative; overflow: hidden;
  }
  .module-card.enabled:hover {
    box-shadow: 0 6px 24px rgba(37,99,168,.15);
    border-color: var(--blue);
  }
  .module-card.locked { opacity: .7; }

  .module-card-top { display: flex; align-items: flex-start; gap: 16px; }
  .module-icon {
    width: 52px; height: 52px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; flex-shrink: 0;
  }
  .icon-navy { background: #dce6f5; }
  .icon-gold  { background: #fef3c7; }

  .module-info h3 { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .module-info p  { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .module-footer { margin-top: auto; }

  /* Locked overlay stripe */
  .lock-stripe {
    position: absolute; top: 0; right: 0;
    background: #f1f5f9;
    padding: 4px 12px;
    font-size: 11px; font-weight: 600;
    color: var(--muted); border-bottom-left-radius: 8px;
    display: flex; align-items: center; gap: 4px;
  }

  /* Coming soon */
  .coming-soon-badge {
    position: absolute; top: 0; right: 0;
    background: var(--gold); color: var(--navy);
    padding: 4px 12px; font-size: 11px; font-weight: 700;
    border-bottom-left-radius: 8px;
  }

  /* Spinner overlay for page load */
  .page-loader {
    position: fixed; inset: 0;
    background: #fff; display: flex;
    align-items: center; justify-content: center;
    z-index: 999; flex-direction: column; gap: 12px;
  }
  .page-loader p { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<div class="page-loader" id="loader">
  <span class="spinner spinner-blue" style="width:28px;height:28px;border-width:3px"></span>
  <p>Loading…</p>
</div>

<div id="navbar-slot"></div>

<div class="container" id="main" style="display:none">

  <div class="welcome">
    <div>
      <h1>Welcome back, <span class="welcome-gold" id="welcome-name"></span></h1>
      <p>Select a module below to access the fee calculator.</p>
    </div>
    <div id="welcome-logo"></div>
  </div>

  <div class="modules-label">Available Modules</div>
  <div class="modules-grid" id="modules-grid">
    <!-- Rendered by JS -->
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/track.js"></script>
<script>
  const MODULES = [
    {
      key:      'us_patenting',
      title:    'USA Patent Filing',
      desc:     'Calculate professional and government fees for US patent applications novelty search, drafting & filing, and prosecution.',
      icon:     '🇺🇸',
      iconCls:  'icon-navy',
      href:     'us-patent.html',
      wip:      false,
    },
    {
      key:      'india_patenting',
      title:    'India Patent Filing',
      desc:     'Calculate fees for Indian patent applications under the Indian Patents Act search, drafting, filing, and prosecution.',
      icon:     '🇮🇳',
      iconCls:  'icon-gold',
      href:     'india-patent.html',
      wip:      false,
    },
    {
      key:      'us_trademark',
      title:    'US Trademark Filing',
      desc:     'Calculate professional and government fees for US trademark applications — search, filing (ITU / In Use), prosecution, and maintenance.',
      icon:     '™',
      iconCls:  'icon-navy',
      href:     'us-trademark.html',
      wip:      false,
    },
    {
      key:      'combined_patent',
      title:    'Patent Filing: India + US',
      desc:     'Single calculator for India, US, or both jurisdictions. One search and draft covers both countries, with separate filing and prosecution fees per country.',
      icon:     '🌐',
      iconCls:  'icon-gold',
      href:     'patent.html',
      wip:      false,
    },
  ];

  (async () => {
    const auth = await requireAuth();
    if (!auth) return;

    const { profile } = auth;

    renderNavbar(profile, 'Dashboard');
    trackPageVisit(profile.id, 'dashboard');
    document.getElementById('welcome-name').textContent =
      profile.full_name || profile.email.split('@')[0];

    // Client logo on the right of the welcome box
    if (profile.logo_url) {
      document.getElementById('welcome-logo').innerHTML =
        `<div style="background:#fff;border-radius:10px;padding:10px 18px;line-height:0;box-shadow:0 2px 8px rgba(0,0,0,.15)">
           <img src="${profile.logo_url}" style="height:44px;max-width:160px;object-fit:contain;display:block" alt="">
         </div>`;
    }

    // Render module cards
    const grid = document.getElementById('modules-grid');
    grid.innerHTML = MODULES.filter(m => !m.wip && profile[m.key]).map(m => {
      return buildCard(m, true);
    }).join('');

    document.getElementById('loader').style.display = 'none';
    document.getElementById('main').style.display   = 'block';
  })();

  function buildCard(m, hasAccess) {
    if (m.wip) {
      return `
        <div class="module-card">
          <div class="coming-soon-badge">Coming Soon</div>
          <div class="module-card-top">
            <div class="module-icon ${m.iconCls}">${m.icon}</div>
            <div class="module-info">
              <h3>${m.title}</h3>
              <p>${m.desc}</p>
            </div>
          </div>
          <div class="module-footer">
            <span class="badge badge-gold">In Development</span>
          </div>
        </div>`;
    }

    if (!hasAccess) {
      return `
        <div class="module-card locked">
          <div class="lock-stripe">🔒 No Access</div>
          <div class="module-card-top">
            <div class="module-icon ${m.iconCls}">${m.icon}</div>
            <div class="module-info">
              <h3>${m.title}</h3>
              <p>${m.desc}</p>
            </div>
          </div>
          <div class="module-footer">
            <span class="badge badge-gray">Contact your administrator to enable access.</span>
          </div>
        </div>`;
    }

    return `
      <div class="module-card enabled">
        <div class="module-card-top">
          <div class="module-icon ${m.iconCls}">${m.icon}</div>
          <div class="module-info">
            <h3>${m.title}</h3>
            <p>${m.desc}</p>
          </div>
        </div>
        <div class="module-footer">
          <a href="${m.href}" class="btn btn-primary">Open Calculator →</a>
        </div>
      </div>`;
  }
</script>
</body>
</html>
