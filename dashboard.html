<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvnTree · Dashboard</title>
<link rel="icon" href="/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
  .dash-hero {
    position: relative;
    padding: 50px 40px 56px;
    background: linear-gradient(135deg, #0F1B3D 0%, #142554 100%);
    color: #fff;
    overflow: hidden;
  }
  .dash-hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image: var(--halftone);
    opacity: .55;
  }
  .dash-hero::after {
    content: '';
    position: absolute;
    right: -100px; top: -100px;
    width: 480px; height: 480px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(31,160,224,.25) 0%, transparent 65%);
    pointer-events: none;
  }
  .dash-hero-inner {
    position: relative;
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 40px;
    align-items: center;
  }
  .dash-hero h1 {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -.8px;
    line-height: 1.1;
    margin-bottom: 14px;
    color: rgba(255,255,255,.7);
  }
  .dash-hero h1 .accent { color: var(--blue); }
  .dash-hero-sub {
    font-size: 15.5px;
    color: rgba(255,255,255,.65);
    max-width: 540px;
    line-height: 1.55;
  }
  .dash-hero-eyebrow {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -.3px;
    text-transform: none;
    margin-bottom: 10px;
  }
  .dash-actions { display: flex; gap: 10px; margin-top: 24px; flex-wrap: wrap; }

  /* Modules section */
  .modules-section { padding: 40px; max-width: 1280px; margin: 0 auto; }
  .modules-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
    gap: 18px;
  }
  .module-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 26px 26px 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: border-color .2s, box-shadow .2s, transform .2s;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
  }
  .module-card::after {
    content: '';
    position: absolute;
    right: -40px; top: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--blue-tint) 0%, transparent 70%);
    opacity: 0;
    transition: opacity .25s;
  }
  .module-card:hover {
    border-color: var(--blue);
    box-shadow: 0 12px 30px rgba(31,160,224,.14);
    transform: translateY(-2px);
  }
  .module-card:hover::after { opacity: 1; }

  .module-card-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
  }
  .module-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: -.3px;
  }
  .module-icon.us    { background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 100%); color: #1E40AF; }
  .module-icon.in    { background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%); color: #92400E; }
  .module-icon.tm    { background: linear-gradient(135deg, #E0E7FF 0%, #C7D2FE 100%); color: #4338CA; }
  .module-icon.both  { background: linear-gradient(135deg, #CFFAFE 0%, #A5F3FC 100%); color: #155E75; }

  .module-info { flex: 1; }
  .module-info h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 5px;
    letter-spacing: -.3px;
  }
  .module-info p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.55;
  }

  .module-foot {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--line-soft);
  }
  .module-cta {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue-deep);
  }
  .module-card:hover .module-cta { color: var(--blue); }
  .module-cta svg {
    width: 14px; height: 14px;
    transition: transform .2s;
  }
  .module-card:hover .module-cta svg { transform: translateX(3px); }
  .module-meta {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .module-meta .dot { width: 5px; height: 5px; border-radius: 3px; background: var(--green); }

  .module-card.locked {
    opacity: .55;
    pointer-events: none;
  }
  .module-card.locked .module-cta { color: var(--muted); }

  /* Spinner overlay for page load */
  .page-loader {
    position: fixed; inset: 0;
    background: #fff; display: flex;
    align-items: center; justify-content: center;
    z-index: 999; flex-direction: column; gap: 12px;
  }
  .page-loader p { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<div class="page-loader" id="loader">
  <span class="spinner spinner-blue" style="width:28px;height:28px;border-width:3px"></span>
  <p>Loading…</p>
</div>

<div id="navbar-slot"></div>

<div id="main" style="display:none">

  <!-- HERO -->
  <section class="dash-hero">
    <div class="dash-hero-inner">
      <div>
        <div class="dash-hero-eyebrow">Welcome back, <span id="welcome-name"></span></div>
        <h1>Quote for your patent</h1>
        <h1><span class="accent">in under a minute.</span></h1>
        <p class="dash-hero-sub">Choose a calculator below to estimate professional and government fees across jurisdictions.</p>
        <div class="dash-actions">
          <a href="us-patent.html" class="btn btn-primary">
            New US Patent estimate
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
          </a>
          <a href="patent.html" class="btn btn-on-dark-ghost">India + US combined</a>
        </div>
      </div>
      <div id="welcome-logo"></div>
    </div>
  </section>

  <!-- MODULES -->
  <section class="modules-section">
    <div class="section-head" style="margin-bottom: 22px">
      <div>
        <div class="section-eyebrow">Available modules</div>
        <div class="section-title">Pick a calculator</div>
      </div>
    </div>

    <div class="modules-grid" id="modules-grid">
      <!-- Rendered by JS -->
    </div>
  </section>

</div>

<div id="footer-slot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/track.js"></script>
<script>
  const MODULES = [
    {
      key:      'us_patenting',
      title:    'USA Patent Filing',
      desc:     'Calculate professional and government fees for US patent applications novelty search, drafting & filing, and prosecution.',
      iconCls:  'us',
      iconContent: 'US',
      href:     'us-patent.html',
      wip:      false,
    },
    {
      key:      'india_patenting',
      title:    'India Patent Filing',
      desc:     'Calculate fees for Indian patent applications under the Indian Patents Act search, drafting, filing, and prosecution.',
      iconCls:  'in',
      iconContent: 'IN',
      href:     'india-patent.html',
      wip:      false,
    },
    {
      key:      'us_trademark',
      title:    'US Trademark Filing',
      desc:     'Calculate professional and government fees for US trademark applications — search, filing (ITU / In Use), prosecution, and maintenance.',
      iconCls:  'tm',
      iconContent: 'TM',
      href:     'us-trademark.html',
      wip:      false,
    },
    {
      key:      'combined_patent',
      title:    'Patent Filing: India + US',
      desc:     'Single calculator for India, US, or both jurisdictions. One search and draft covers both countries, with separate filing and prosecution fees per country.',
      iconCls:  'both',
      iconContent: '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14 14 0 0 1 0 18"/><path d="M12 3a14 14 0 0 0 0 18"/></svg>',
      href:     'patent.html',
      wip:      false,
    },
  ];

  (async () => {
    const auth = await requireAuth();
    if (!auth) return;

    const { profile } = auth;

    renderNavbar(profile, 'Dashboard');
    trackPageVisit(profile.id, 'dashboard');
    document.getElementById('welcome-name').textContent =
      profile.full_name || profile.email.split('@')[0];

    // Client logo on the right of the welcome box
    if (profile.logo_url) {
      document.getElementById('welcome-logo').innerHTML =
        `<div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:16px 22px;line-height:0;backdrop-filter:blur(6px)">
           <img src="${profile.logo_url}" style="height:44px;max-width:160px;object-fit:contain;display:block" alt="">
         </div>`;
    }

    // Render module cards
    const grid = document.getElementById('modules-grid');
    grid.innerHTML = MODULES.filter(m => !m.wip && profile[m.key]).map(m => {
      return buildCard(m, true);
    }).join('');

    document.getElementById('loader').style.display = 'none';
    document.getElementById('main').style.display   = 'block';
  })();

  function buildCard(m, hasAccess) {
    const arrowSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;

    if (m.wip) {
      return `
        <div class="module-card">
          <div class="module-card-top">
            <div class="module-icon ${m.iconCls}">${m.iconContent}</div>
            <div class="module-info">
              <h3>${m.title}</h3>
              <p>${m.desc}</p>
            </div>
          </div>
          <div class="module-foot">
            <div class="module-meta"><span class="dot" style="background:var(--amber)"></span> Coming soon</div>
            <span class="module-cta" style="color:var(--muted)">In development</span>
          </div>
        </div>`;
    }

    if (!hasAccess) {
      return `
        <div class="module-card locked">
          <div class="module-card-top">
            <div class="module-icon ${m.iconCls}">${m.iconContent}</div>
            <div class="module-info">
              <h3>${m.title}</h3>
              <p>${m.desc}</p>
            </div>
          </div>
          <div class="module-foot">
            <div class="module-meta">🔒 No Access</div>
            <span class="module-cta" style="color:var(--muted)">Contact admin</span>
          </div>
        </div>`;
    }

    return `
      <a href="${m.href}" class="module-card">
        <div class="module-card-top">
          <div class="module-icon ${m.iconCls}">${m.iconContent}</div>
          <div class="module-info">
            <h3>${m.title}</h3>
            <p>${m.desc}</p>
          </div>
        </div>
        <div class="module-foot">
          <div class="module-meta"><span class="dot"></span> Available</div>
          <span class="module-cta">Open calculator ${arrowSvg}</span>
        </div>
      </a>`;
  }
</script>
</body>
</html>
