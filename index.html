<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvnTree — Sign In</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(145deg, #0f1d3d 0%, #1A2F5E 50%, #1e3d7a 100%);
  }

  .login-wrap {
    width: 100%; max-width: 420px; padding: 20px;
  }

  /* Brand header above card */
  .login-brand {
    text-align: center; margin-bottom: 28px;
  }
  .login-brand-name {
    font-size: 36px; font-weight: 800; color: var(--gold);
    letter-spacing: -1px; line-height: 1;
  }
  .login-brand-tag {
    font-size: 12px; color: rgba(255,255,255,.5);
    letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px;
  }
  .login-brand-divider {
    width: 40px; height: 2px; background: var(--gold);
    margin: 14px auto 0; border-radius: 2px; opacity: .6;
  }

  /* Card */
  .login-card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 24px 64px rgba(0,0,0,.35);
    padding: 36px 32px;
  }
  .login-card h2 {
    font-size: 20px; font-weight: 700; color: var(--navy);
    margin-bottom: 4px;
  }
  .login-card p {
    font-size: 13px; color: var(--muted); margin-bottom: 28px;
  }

  .form-stack { display: flex; flex-direction: column; gap: 18px; }

  .login-submit {
    margin-top: 6px;
    padding: 12px;
    font-size: 15px;
  }

  .login-footer {
    text-align: center; margin-top: 20px;
    font-size: 12px; color: rgba(255,255,255,.35);
  }

  /* Error */
  #error-box {
    background: #fee2e2; border: 1px solid #fca5a5;
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; color: #991b1b;
    margin-bottom: 16px;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <img src="/img/logo.png" alt="InvnTree" style="height:52px;display:block;margin:0 auto 16px;">
  </div>

  <div class="login-card">
    <h2>Sign in</h2>
    <p>Patent Fee Platform — enter your credentials to continue.</p>

    <div id="error-box" class="hidden"></div>

    <div class="form-stack">
      <div class="field">
        <label class="field-label">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label class="field-label">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary btn-full login-submit" id="login-btn" onclick="handleLogin()">
        Sign In
      </button>
    </div>
  </div>

  <div class="login-footer">© 2025 InvnTree IP Services. All rights reserved.</div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script>
  // ── If already logged in, skip to dashboard ──────────────────
  (async () => {
    const { data: { session } } = await db.auth.getSession();
    if (session) window.location.href = 'dashboard.html';

    // Show message if redirected due to inactivity/deactivation
    const reason = new URLSearchParams(window.location.search).get('reason');
    if (reason === 'inactive') showError('Your account has been deactivated. Contact your administrator.');
  })();

  // ── Handle login ─────────────────────────────────────────────
  async function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('login-btn');

    if (!email || !password) { showError('Please enter your email and password.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    clearError();

    const { data, error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
      showError(error.message === 'Invalid login credentials'
        ? 'Incorrect email or password.'
        : error.message);
      return;
    }

    // Check account is active
    const { data: profile } = await db
      .from('profiles').select('is_active').eq('id', data.user.id).single();

    if (profile && !profile.is_active) {
      await db.auth.signOut();
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
      showError('Your account has been deactivated. Contact your administrator.');
      return;
    }

    window.location.href = 'dashboard.html';
  }

  // ── Enter key support ─────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.classList.remove('hidden');
  }
  function clearError() {
    document.getElementById('error-box').classList.add('hidden');
  }
</script>
</body>
</html>
